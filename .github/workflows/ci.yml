name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --silent || true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
